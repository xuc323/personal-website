name: Deploy to Bucket

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure HMAC credentials
        run: |
          cat > ${{ github.workspace }}/.boto <<EOF
          [Credentials]
          gs_access_key_id = ${{ secrets.GS_ACCESS_KEY_ID }}
          gs_secret_access_key = ${{ secrets.GS_SECRET_ACCESS_KEY }}
          EOF

      - name: Sync to Storage Bucket
        env:
          BOTO_CONFIG: ${{ github.workspace }}/.boto
        run: gsutil -m rsync -r -d ./out gs://${{ secrets.GS_BUCKET_NAME }}

      - name: Post-Run Cleanup
        if: always()
        run: |
          if [ -f "${{ github.workspace }}/.boto" ]; then
            rm -f ${{ github.workspace }}/.boto
            echo "✅ HMAC credentials file found and deleted."
          else
            echo "ℹ️ No .boto file found. Nothing to clean up."
          fi
